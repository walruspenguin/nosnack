<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>No Snack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --dark: #0e0e0e;
    --off-white: #f0ece4;
    --accent: #c0392b;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--off-white);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  #idle-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  #idle-screen .clock {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(56px, 18vw, 96px);
    letter-spacing: -2px;
    line-height: 1;
    color: var(--off-white);
  }

  #idle-screen .date {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  #idle-screen .next-reminder {
    margin-top: 32px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  #idle-screen .streak-display {
    position: absolute;
    bottom: 32px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    cursor: pointer;
    padding: 12px;
  }
  #idle-screen .streak-display span {
    color: var(--off-white);
    font-weight: 500;
  }

  /* Fullscreen tap zone - tap anywhere on idle to request fullscreen */
  #fs-hint {
    position: absolute;
    top: 20px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #333;
    text-transform: uppercase;
    cursor: pointer;
  }

  #reminder-screen {
    display: none;
    height: 100%;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  #reminder-screen.active {
    display: flex;
  }

  .photo-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.85) 100%);
  }

  .photo-message {
    position: absolute;
    bottom: 24px;
    left: 24px;
    right: 24px;
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 8vw, 42px);
    line-height: 1.15;
    color: #fff;
  }

  .dismiss-panel {
    background: var(--dark);
    padding: 24px 24px 36px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .dismiss-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .dismiss-phrase {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  #dismiss-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: var(--off-white);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    padding: 8px 0;
    outline: none;
    width: 100%;
    caret-color: var(--accent);
    transition: border-color 0.2s;
  }

  #dismiss-input:focus { border-bottom-color: var(--off-white); }
  #dismiss-input.correct { border-bottom-color: #27ae60; color: #27ae60; }
  #dismiss-input.wrong { border-bottom-color: var(--accent); }

  #log-screen {
    display: none;
    height: 100%;
    flex-direction: column;
    padding: 48px 28px 36px;
    gap: 8px;
  }

  #log-screen.active { display: flex; }

  .log-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .log-subtitle {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .week-grid {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }

  .week-day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .week-day .label {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .week-day .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .week-day .dot.dismissed { background: var(--accent); border-color: var(--accent); color: white; }
  .week-day .dot.clean { background: #1a3a2a; border-color: #27ae60; }
  .week-day .dot.today { border-color: var(--off-white); }

  .log-entries {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 12px;
  }

  .log-entry .entry-date { color: var(--muted); }
  .log-entry .entry-status { color: var(--accent); letter-spacing: 0.05em; }
  .log-entry .entry-status.clean { color: #27ae60; }

  .back-btn {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    padding: 12px;
    border: 1px solid #222;
  }

  #debug-wrapper {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .debug-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #2a2a2a;
    text-transform: uppercase;
  }

  #debug-panel { display: flex; gap: 8px; }

  .debug-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    background: #1a1a1a;
    border: 1px solid #222;
    color: #2a2a2a;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="idle-screen">
  <div id="fs-hint" onclick="requestFS()">tap to go fullscreen</div>
  <div class="clock" id="clock">00:00</div>
  <div class="date" id="date-display">—</div>
  <div class="next-reminder" id="next-reminder-label">—</div>
  <div class="streak-display" onclick="showLog()">
    This week: <span id="week-count">0</span> dismissal(s)
  </div>
</div>

<div id="reminder-screen">
  <div class="photo-container">
    <img id="reminder-photo" src="" alt="">
    <div class="photo-overlay"></div>
    <div class="photo-message" id="reminder-message"></div>
  </div>
  <div class="dismiss-panel">
    <div class="dismiss-label">Type to dismiss</div>
    <div class="dismiss-phrase">"I am making a choice right now"</div>
    <input type="text" id="dismiss-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type the phrase above...">
  </div>
</div>

<div id="log-screen">
  <div class="log-title">Your record.</div>
  <div class="log-subtitle">Past 7 days</div>
  <div class="week-grid" id="week-grid"></div>
  <div class="log-entries" id="log-entries"></div>
  <div class="back-btn" onclick="showIdle()">← back</div>
</div>

<div id="debug-wrapper">
  <div class="debug-label">test controls</div>
  <div id="debug-panel">
    <button class="debug-btn" onclick="triggerReminder()">trigger</button>
    <button class="debug-btn" onclick="clearData()">clear</button>
  </div>
</div>

const SLIDES = [
  { img: KIDS_IMG, msg: "Every extra day matters." },
  { img: SELF_IMG, msg: "Is it worth it?" }
];

// --- Wake Lock ---
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch(e) { /* silently ignore */ }
  }
}
async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e){} wakeLock = null; }
}

// Re-acquire wake lock if page becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// --- Fullscreen ---
function requestFS() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  document.getElementById('fs-hint').style.display = 'none';
}

// Auto-fullscreen when reminder fires
function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

// --- Vibration ---
function vibrate() {
  if ('vibrate' in navigator) {
    // Pulse pattern: buzz 300ms, pause 100ms, buzz 300ms, pause 100ms, buzz 500ms
    navigator.vibrate([300, 100, 300, 100, 500]);
  }
}

// --- State ---
function getLog() {
  try { return JSON.parse(localStorage.getItem('nosnack_log') || '[]'); } catch { return []; }
}
function saveLog(log) { localStorage.setItem('nosnack_log', JSON.stringify(log)); }
function getTodayStr() { return new Date().toISOString().split('T')[0]; }
function hasReminderFiredToday() {
  return localStorage.getItem('nosnack_fired_' + getTodayStr()) === '1';
}
function markFiredToday() {
  localStorage.setItem('nosnack_fired_' + getTodayStr(), '1');
}
function logDismissal() {
  const log = getLog();
  log.push({ date: getTodayStr(), ts: new Date().toISOString(), dismissed: true });
  saveLog(log);
}

// --- UI ---
function showIdle() {
  document.getElementById('idle-screen').style.display = 'flex';
  document.getElementById('reminder-screen').classList.remove('active');
  document.getElementById('log-screen').classList.remove('active');
  updateWeekCount();
  releaseWakeLock();
}

function showReminder() {
  const today = new Date();
  const dayIndex = Math.floor((today - new Date('2024-01-01')) / 86400000);
  const slide = SLIDES[dayIndex % 2];

  document.getElementById('reminder-photo').src = slide.img;
  document.getElementById('reminder-message').textContent = slide.msg;
  document.getElementById('dismiss-input').value = '';
  document.getElementById('dismiss-input').className = '';

  document.getElementById('idle-screen').style.display = 'none';
  document.getElementById('log-screen').classList.remove('active');
  document.getElementById('reminder-screen').classList.add('active');

  goFullscreen();
  requestWakeLock();
  vibrate();

  setTimeout(() => document.getElementById('dismiss-input').focus(), 400);
}

function showLog() {
  document.getElementById('idle-screen').style.display = 'none';
  document.getElementById('reminder-screen').classList.remove('active');
  document.getElementById('log-screen').classList.add('active');
  renderLog();
}

function renderLog() {
  const log = getLog();
  const grid = document.getElementById('week-grid');
  const entries = document.getElementById('log-entries');
  grid.innerHTML = '';
  entries.innerHTML = '';

  const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const today = new Date();

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const hasDismissal = log.some(e => e.date === ds && e.dismissed);
    const isPast = i > 0;
    const isToday = i === 0;

    const div = document.createElement('div');
    div.className = 'week-day';
    div.innerHTML = `
      <div class="label">${days[d.getDay()]}</div>
      <div class="dot ${hasDismissal ? 'dismissed' : (isPast ? 'clean' : '')} ${isToday ? 'today' : ''}">${hasDismissal ? '✕' : (isPast ? '✓' : '')}</div>
    `;
    grid.appendChild(div);
  }

  const recent = [...log].reverse().slice(0, 20);
  if (recent.length === 0) {
    entries.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:16px 0;">No dismissals logged yet.</div>';
    return;
  }
  recent.forEach(e => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const ts = new Date(e.ts);
    const timeStr = ts.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' · ' + ts.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    div.innerHTML = `
      <span class="entry-date">${timeStr}</span>
      <span class="entry-status">dismissed</span>
    `;
    entries.appendChild(div);
  });
}

function updateWeekCount() {
  const log = getLog();
  const today = new Date();
  const weekAgo = new Date(today); weekAgo.setDate(today.getDate() - 7);
  const count = log.filter(e => new Date(e.ts) >= weekAgo && e.dismissed).length;
  document.getElementById('week-count').textContent = count;
}

// --- Clock & reminder check ---
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m;

  const dateOpts = { weekday: 'long', month: 'long', day: 'numeric' };
  document.getElementById('date-display').textContent =
    now.toLocaleDateString('en-US', dateOpts).toUpperCase();

  const reminderToday = new Date(now);
  reminderToday.setHours(REMINDER_HOUR, REMINDER_MIN, 0, 0);
  if (now < reminderToday) {
    const diffMs = reminderToday - now;
    const diffH = Math.floor(diffMs / 3600000);
    const diffM = Math.floor((diffMs % 3600000) / 60000);
    document.getElementById('next-reminder-label').textContent =
      `reminder in ${diffH > 0 ? diffH + 'h ' : ''}${diffM}m`;
  } else {
    document.getElementById('next-reminder-label').textContent =
      hasReminderFiredToday() ? 'reminder done for today' : 'reminder pending...';
  }

  const isReminderTime = now.getHours() === REMINDER_HOUR && now.getMinutes() === REMINDER_MIN;
  const reminderActive = document.getElementById('reminder-screen').classList.contains('active');
  if (isReminderTime && !hasReminderFiredToday() && !reminderActive) {
    markFiredToday();
    showReminder();
  }
}

// --- Dismiss input ---
document.getElementById('dismiss-input').addEventListener('input', function() {
  const val = this.value;
  if (val === REQUIRED_PHRASE) {
    this.classList.add('correct');
    this.classList.remove('wrong');
    logDismissal();
    setTimeout(() => showIdle(), 800);
  } else if (REQUIRED_PHRASE.startsWith(val)) {
    this.classList.remove('correct', 'wrong');
  } else {
    this.classList.add('wrong');
    this.classList.remove('correct');
  }
});

// Prevent back gesture / hardware back on Android from bypassing reminder
window.addEventListener('popstate', (e) => {
  const reminderActive = document.getElementById('reminder-screen').classList.contains('active');
  if (reminderActive) {
    history.pushState(null, '', window.location.href);
  }
});
history.pushState(null, '', window.location.href);

// --- Debug ---
function triggerReminder() { showReminder(); }
function clearData() {
  if (confirm('Clear all log data?')) { localStorage.clear(); updateWeekCount(); }
}

// --- Init ---
requestWakeLock();
updateClock();
setInterval(updateClock, 10000);
showIdle();
</script>
