<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>No Snack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --dark: #0e0e0e;
    --off-white: #f0ece4;
    --red: #c0392b;
    --green: #27ae60;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--off-white);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* === IDLE === */
  #idle-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  #fs-hint {
    position: absolute;
    top: 20px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #333;
    text-transform: uppercase;
    cursor: pointer;
  }

  .clock {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(56px, 18vw, 96px);
    letter-spacing: -2px;
    line-height: 1;
  }

  .date {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .next-reminder {
    margin-top: 32px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .streak-display {
    position: absolute;
    bottom: 32px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    cursor: pointer;
    padding: 12px;
  }
  .streak-display span { color: var(--off-white); font-weight: 500; }

  /* === REMINDER === */
  #reminder-screen {
    display: none;
    height: 100%;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  #reminder-screen.active { display: flex; }

  .photo-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.85) 100%);
  }

  .photo-message {
    position: absolute;
    bottom: 24px;
    left: 24px;
    right: 24px;
    font-family: 'DM Serif Display', serif;
    font-size: clamp(24px, 7vw, 38px);
    line-height: 1.15;
    color: #fff;
  }

  /* === CHOICE PANEL === */
  .choice-panel {
    background: var(--dark);
    padding: 20px 20px 32px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .choice-option {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .choice-phrase {
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 2px 0;
  }
  .choice-phrase.fail { color: var(--red); }
  .choice-phrase.win  { color: var(--green); }

  .choice-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #2a2a2a;
    color: var(--off-white);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 7px 0;
    outline: none;
    width: 100%;
    caret-color: var(--muted);
    transition: border-color 0.2s;
  }
  .choice-input::placeholder { color: #333; font-size: 12px; }
  .choice-input:focus { border-bottom-color: #444; }
  .choice-input.correct-fail  { border-bottom-color: var(--red);   color: var(--red); }
  .choice-input.correct-win   { border-bottom-color: var(--green); color: var(--green); }
  .choice-input.wrong         { border-bottom-color: #555; }

  .divider {
    height: 1px;
    background: #1a1a1a;
    margin: 2px 0;
  }

  /* === LOG === */
  #log-screen {
    display: none;
    height: 100%;
    flex-direction: column;
    padding: 48px 28px 36px;
    gap: 8px;
    overflow: hidden;
  }
  #log-screen.active { display: flex; }

  .log-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .log-subtitle {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .week-grid {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }

  .week-day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .week-day .label {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .week-day .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .week-day .dot.snacked  { background: var(--red);   border-color: var(--red);   color: white; }
  .week-day .dot.resisted { background: #1a3a2a;      border-color: var(--green); color: var(--green); }
  .week-day .dot.today    { border-color: var(--off-white); }

  .log-entries {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .log-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 12px;
  }

  .log-entry .entry-date { color: var(--muted); }
  .log-entry .snacked-label  { color: var(--red);   letter-spacing: 0.05em; }
  .log-entry .resisted-label { color: var(--green); letter-spacing: 0.05em; }

  .back-btn {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    padding: 12px;
    border: 1px solid #222;
    flex-shrink: 0;
  }

  /* === DEBUG === */
  #debug-wrapper {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .debug-label { font-size: 9px; letter-spacing: 0.15em; color: #222; text-transform: uppercase; }
  #debug-panel { display: flex; gap: 8px; }
  .debug-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    color: #2a2a2a;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- IDLE -->
<div id="idle-screen">
  <div id="fs-hint" onclick="requestFS()">tap to go fullscreen</div>
  <div class="clock" id="clock">00:00</div>
  <div class="date" id="date-display">—</div>
  <div class="next-reminder" id="next-reminder-label">—</div>
  <div class="streak-display" onclick="showLog()">
    This week: <span id="week-snacked">0</span> snacked · <span id="week-resisted">0</span> resisted
  </div>
</div>

<!-- REMINDER -->
<div id="reminder-screen">
  <div class="photo-container">
    <img id="reminder-photo" src="" alt="">
    <div class="photo-overlay"></div>
    <div class="photo-message" id="reminder-message"></div>
  </div>
  <div class="choice-panel">
    <div class="choice-label">Type your choice to confirm it</div>

    <div class="choice-option">
      <div class="choice-phrase fail">"I am choosing to snack"</div>
      <input class="choice-input" id="input-fail" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="type to choose this...">
    </div>

    <div class="divider"></div>

    <div class="choice-option">
      <div class="choice-phrase win">"I choose not to snack"</div>
      <input class="choice-input" id="input-win" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="type to choose this...">
    </div>
  </div>
</div>

<!-- LOG -->
<div id="log-screen">
  <div class="log-title">Your record.</div>
  <div class="log-subtitle">Past 7 days</div>
  <div class="week-grid" id="week-grid"></div>
  <div class="log-entries" id="log-entries"></div>
  <div class="back-btn" onclick="showIdle()">← back</div>
</div>

<!-- DEBUG -->
<div id="debug-wrapper">
  <div class="debug-label">test</div>
  <div id="debug-panel">
    <button class="debug-btn" onclick="triggerReminder()">trigger</button>
    <button class="debug-btn" onclick="clearData()">clear</button>
  </div>
</div>

const SLIDES = [
  { img: KIDS_IMG, msg: "Every extra day matters." },
  { img: SELF_IMG, msg: "Is it worth it?" }
];

// --- Wake Lock ---
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e){} wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// --- Fullscreen ---
function requestFS() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  document.getElementById('fs-hint').style.display = 'none';
}
function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

// --- Vibration ---
function vibrate() {
  if ('vibrate' in navigator) navigator.vibrate([300, 100, 300, 100, 500]);
}

// --- Storage ---
function getLog() {
  try { return JSON.parse(localStorage.getItem('nosnack_log') || '[]'); } catch { return []; }
}
function saveLog(log) { localStorage.setItem('nosnack_log', JSON.stringify(log)); }
function getTodayStr() { return new Date().toISOString().split('T')[0]; }
function hasReminderFiredToday() {
  return localStorage.getItem('nosnack_fired_' + getTodayStr()) === '1';
}
function markFiredToday() {
  localStorage.setItem('nosnack_fired_' + getTodayStr(), '1');
}
function logEntry(outcome) { // 'snacked' or 'resisted'
  const log = getLog();
  log.push({ date: getTodayStr(), ts: new Date().toISOString(), outcome });
  saveLog(log);
}

// --- UI ---
function showIdle() {
  document.getElementById('idle-screen').style.display = 'flex';
  document.getElementById('reminder-screen').classList.remove('active');
  document.getElementById('log-screen').classList.remove('active');
  updateWeekCounts();
  releaseWakeLock();
}

function showReminder() {
  const dayIndex = Math.floor((new Date() - new Date('2024-01-01')) / 86400000);
  const slide = SLIDES[dayIndex % 2];
  document.getElementById('reminder-photo').src = slide.img;
  document.getElementById('reminder-message').textContent = slide.msg;
  document.getElementById('input-fail').value = '';
  document.getElementById('input-win').value = '';
  document.getElementById('input-fail').className = 'choice-input';
  document.getElementById('input-win').className = 'choice-input';

  document.getElementById('idle-screen').style.display = 'none';
  document.getElementById('log-screen').classList.remove('active');
  document.getElementById('reminder-screen').classList.add('active');

  goFullscreen();
  requestWakeLock();
  vibrate();
}

function showLog() {
  document.getElementById('idle-screen').style.display = 'none';
  document.getElementById('reminder-screen').classList.remove('active');
  document.getElementById('log-screen').classList.add('active');
  renderLog();
}

function dismiss(outcome) {
  logEntry(outcome);
  setTimeout(() => showIdle(), 700);
}

// --- Inputs ---
function makeInputHandler(inputEl, phrase, outcomeClass, outcome) {
  inputEl.addEventListener('input', function() {
    const val = this.value;
    if (val === phrase) {
      this.className = 'choice-input ' + outcomeClass;
      dismiss(outcome);
    } else if (phrase.startsWith(val)) {
      this.className = 'choice-input';
    } else {
      this.className = 'choice-input wrong';
    }
  });
}

makeInputHandler(
  document.getElementById('input-fail'),
  PHRASE_FAIL, 'correct-fail', 'snacked'
);
makeInputHandler(
  document.getElementById('input-win'),
  PHRASE_WIN, 'correct-win', 'resisted'
);

// --- Log rendering ---
function renderLog() {
  const log = getLog();
  const grid = document.getElementById('week-grid');
  const entries = document.getElementById('log-entries');
  grid.innerHTML = '';
  entries.innerHTML = '';

  const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const today = new Date();

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const entry = log.slice().reverse().find(e => e.date === ds);
    const isToday = i === 0;
    const isPast = i > 0;

    let dotClass = isToday ? 'today' : '';
    let dotChar = '';
    if (entry) {
      dotClass += ' ' + (entry.outcome === 'snacked' ? 'snacked' : 'resisted');
      dotChar = entry.outcome === 'snacked' ? '✕' : '✓';
    }

    const div = document.createElement('div');
    div.className = 'week-day';
    div.innerHTML = `<div class="label">${days[d.getDay()]}</div><div class="dot ${dotClass}">${dotChar}</div>`;
    grid.appendChild(div);
  }

  const recent = [...log].reverse().slice(0, 30);
  if (recent.length === 0) {
    entries.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:16px 0;">No entries yet.</div>';
    return;
  }
  recent.forEach(e => {
    const ts = new Date(e.ts);
    const timeStr = ts.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' · ' + ts.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <span class="entry-date">${timeStr}</span>
      <span class="${e.outcome === 'snacked' ? 'snacked-label' : 'resisted-label'}">${e.outcome}</span>
    `;
    entries.appendChild(div);
  });
}

function updateWeekCounts() {
  const log = getLog();
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const recent = log.filter(e => new Date(e.ts) >= weekAgo);
  document.getElementById('week-snacked').textContent  = recent.filter(e => e.outcome === 'snacked').length;
  document.getElementById('week-resisted').textContent = recent.filter(e => e.outcome === 'resisted').length;
}

// --- Clock ---
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('date-display').textContent =
    now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'}).toUpperCase();

  const rt = new Date(now); rt.setHours(REMINDER_HOUR, REMINDER_MIN, 0, 0);
  if (now < rt) {
    const diff = rt - now;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    document.getElementById('next-reminder-label').textContent =
      `reminder in ${h > 0 ? h + 'h ' : ''}${m}m`;
  } else {
    document.getElementById('next-reminder-label').textContent =
      hasReminderFiredToday() ? 'reminder done for today' : 'reminder pending...';
  }

  const isTime = now.getHours() === REMINDER_HOUR && now.getMinutes() === REMINDER_MIN;
  const active = document.getElementById('reminder-screen').classList.contains('active');
  if (isTime && !hasReminderFiredToday() && !active) {
    markFiredToday();
    showReminder();
  }
}

// --- Back button block ---
window.addEventListener('popstate', () => {
  if (document.getElementById('reminder-screen').classList.contains('active')) {
    history.pushState(null, '', window.location.href);
  }
});
history.pushState(null, '', window.location.href);

// --- Debug ---
function triggerReminder() { showReminder(); }
function clearData() {
  if (confirm('Clear all data?')) { localStorage.clear(); updateWeekCounts(); }
}

// --- Init ---
requestWakeLock();
updateClock();
setInterval(updateClock, 10000);
showIdle();
</script>
